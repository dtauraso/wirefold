<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" font-family="monospace" font-size="8">
  <defs>
    <marker id="arr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#555"/>
    </marker>
    <marker id="arr-i" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4" fill="#283593"/>
    </marker>
  </defs>

  <rect width="300" height="220" fill="#fafafa" rx="4"/>
  <text x="150" y="16" text-anchor="middle" font-size="10" fill="#333">AND Gates in Topology</text>

  <!-- === INHIBITOR CHAIN === -->

  <!-- in0 -->
  <circle cx="20" cy="180" r="5" fill="#e0e0e0" stroke="#666" stroke-width="1"/>
  <text x="20" y="183" text-anchor="middle" font-size="5" fill="#333">in0</text>

  <!-- i0 -->
  <circle cx="55" cy="180" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="55" y="183" text-anchor="middle" font-size="6" fill="#e65100">i0</text>

  <!-- gate0 -->
  <rect x="86" y="177" width="8" height="6" fill="#e8eaf6" stroke="#283593" stroke-width="0.8" rx="1"/>

  <!-- i1 -->
  <circle cx="120" cy="180" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="120" y="183" text-anchor="middle" font-size="6" fill="#e65100">i1</text>

  <!-- gate1 -->
  <rect x="151" y="177" width="8" height="6" fill="#e8eaf6" stroke="#283593" stroke-width="0.8" rx="1"/>

  <!-- i2 -->
  <circle cx="185" cy="180" r="7" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="185" y="183" text-anchor="middle" font-size="6" fill="#e65100">i2</text>

  <!-- Chain lines -->
  <line x1="25" y1="180" x2="46" y2="180" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="62" y1="180" x2="84" y2="180" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="94" y1="180" x2="111" y2="180" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="127" y1="180" x2="149" y2="180" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="159" y1="180" x2="176" y2="180" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- === RECOGNITION AND TREE === -->

  <!-- a0 (recognition AND) -->
  <circle cx="152" cy="120" r="9" fill="#e8eaf6" stroke="#283593" stroke-width="1.5"/>
  <text x="152" y="123" text-anchor="middle" font-size="6" fill="#283593">a0</text>
  <text x="152" y="108" text-anchor="middle" font-size="6" fill="#283593">AND</text>

  <!-- i1 -> a0 -->
  <line x1="120" y1="173" x2="145" y2="129" stroke="#283593" stroke-width="0.7" marker-end="url(#arr-i)"/>
  <!-- i2 -> a0 -->
  <line x1="185" y1="173" x2="159" y2="129" stroke="#283593" stroke-width="0.7" marker-end="url(#arr-i)"/>

  <!-- Output -->
  <line x1="152" y1="111" x2="152" y2="90" stroke="#283593" stroke-width="0.7" marker-end="url(#arr-i)"/>
  <circle cx="152" cy="85" r="3" fill="#2e7d32"/>
  <text x="162" y="88" text-anchor="start" font-size="6" fill="#2e7d32">to next level</text>

  <!-- === FUTURE TREE (more inhibitors) === -->
  <text x="152" y="45" text-anchor="middle" font-size="7" fill="#bbb">scales to tree with more inhibitors:</text>

  <!-- 4 leaf inputs -->
  <circle cx="40" cy="72" r="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.6"/>
  <circle cx="70" cy="72" r="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.6"/>
  <circle cx="200" cy="72" r="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.6"/>
  <circle cx="230" cy="72" r="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.6"/>

  <!-- Level 1 ANDs -->
  <circle cx="55" cy="60" r="4" fill="#e8eaf6" stroke="#283593" stroke-width="0.6"/>
  <circle cx="215" cy="60" r="4" fill="#e8eaf6" stroke="#283593" stroke-width="0.6"/>

  <!-- Root AND -->
  <circle cx="135" cy="50" r="5" fill="#e8eaf6" stroke="#283593" stroke-width="0.8"/>

  <!-- Tree lines -->
  <line x1="40" y1="69" x2="52" y2="64" stroke="#bbb" stroke-width="0.4"/>
  <line x1="70" y1="69" x2="58" y2="64" stroke="#bbb" stroke-width="0.4"/>
  <line x1="200" y1="69" x2="212" y2="64" stroke="#bbb" stroke-width="0.4"/>
  <line x1="230" y1="69" x2="218" y2="64" stroke="#bbb" stroke-width="0.4"/>
  <line x1="59" y1="57" x2="130" y2="53" stroke="#bbb" stroke-width="0.4"/>
  <line x1="211" y1="57" x2="140" y2="53" stroke="#bbb" stroke-width="0.4"/>

  <!-- Legend -->
  <rect x="210" y="130" width="80" height="55" fill="#f0f0f0" rx="3" stroke="#ccc"/>
  <rect x="218" y="142" width="6" height="5" fill="#e8eaf6" stroke="#283593" stroke-width="0.6" rx="1"/>
  <text x="228" y="148" text-anchor="start" font-size="5" fill="#666">Valve (right=1)</text>
  <circle cx="221" cy="160" r="4" fill="#e8eaf6" stroke="#283593" stroke-width="0.6"/>
  <text x="228" y="163" text-anchor="start" font-size="5" fill="#666">Recognition AND</text>
  <circle cx="221" cy="175" r="2" fill="#2e7d32"/>
  <text x="228" y="178" text-anchor="start" font-size="5" fill="#666">Output to next level</text>
</svg>
