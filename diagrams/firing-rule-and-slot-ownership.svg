<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-weight="400" font-family="ui-sans-serif, system-ui, sans-serif">

  <metadata>
  {
    "diagram": "07-q2-firing-rule-and-slot-ownership",
    "title": "Q2 — Firing rule and slot ownership: wires arrive at the node; the node writes its own slots; slot id is wire-side metadata",
    "nodes": [
      {"id": "node-readgate", "role": "node", "kind": "ReadGate",       "slots": 3, "rule": "AND"},
      {"id": "node-and",      "role": "node", "kind": "AndGate",        "slots": 2, "rule": "AND"},
      {"id": "node-streak",   "role": "node", "kind": "StreakDetector", "slots": 2, "rule": "same-sign"},
      {"id": "node-edge",     "role": "node", "kind": "EdgeNode (XOR)", "slots": 2, "rule": "XOR"}
    ],
    "edges": [
      {"id": "rg-in-0", "source": "upstream-A", "target": "node-readgate", "boundSlot": "s0", "kind": "incoming-wire"},
      {"id": "rg-in-1", "source": "upstream-B", "target": "node-readgate", "boundSlot": "s1", "kind": "incoming-wire"},
      {"id": "rg-in-2", "source": "upstream-C", "target": "node-readgate", "boundSlot": "s2", "kind": "incoming-wire"},
      {"id": "and-in-0","source": "upstream-A", "target": "node-and",      "boundSlot": "s0", "kind": "incoming-wire"},
      {"id": "and-in-1","source": "upstream-B", "target": "node-and",      "boundSlot": "s1", "kind": "incoming-wire"},
      {"id": "sd-in-0", "source": "upstream-A", "target": "node-streak",   "boundSlot": "s0", "kind": "incoming-wire"},
      {"id": "sd-in-1", "source": "upstream-B", "target": "node-streak",   "boundSlot": "s1", "kind": "incoming-wire"},
      {"id": "ed-in-0", "source": "upstream-A", "target": "node-edge",     "boundSlot": "s0", "kind": "incoming-wire"},
      {"id": "ed-in-1", "source": "upstream-B", "target": "node-edge",     "boundSlot": "s1", "kind": "incoming-wire"}
    ]
  }
  </metadata>

  <desc>
node             — kind + rule (one identity); the rule consults the node's own slots when fired
slot             — passive internal state, owned by the node; transitions empty / filled / consumed
incoming-wire    — inter-node edge; carries (value, bound slot id) and arrives at the destination node
bound-slot label — small "→s_k" tag on the wire, indicating which slot the wire deposits into
outgoing-wire    — pulse emitted when the rule fires
no-subscription  — there is no slot→rule edge; consulting slots is intra-node, not an edge
  </desc>

  <style>
    svg { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; font-weight: 400; }
    .diagram-bg      { fill: #fafafa; }
    .title-text      { font-size: 16px; font-weight: bold; fill: #222; text-anchor: middle; }
    .shape-node      { fill: #fff8e1; stroke: #e65100; stroke-width: 2; }
    .shape-slot      { fill: #c8e6c9; stroke: #2e7d32; stroke-width: 1.5; }
    .shape-upstream  { fill: #f5f5f5; stroke: #aaa; stroke-width: 1; stroke-dasharray: 3 2; }
    .incoming        { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow-gray); }
    .outgoing        { stroke: #1565c0; stroke-width: 1.5; fill: none; marker-end: url(#arrow-blue); }
    .legend-bg       { fill: #f0f0f0; stroke: #ccc; stroke-width: 1; }
    .note-bg         { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
  </style>

  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1565c0"/>
    </marker>
  </defs>

  <rect width="1100" height="660" rx="8" class="diagram-bg"/>

  <text x="550" y="30" class="title-text" font-weight="bold" fill="#222" stroke="none">Q2 — Firing rule and slot ownership</text>
  <text x="550" y="48" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">A node IS its rule; slots are passive state the node owns. Wires arrive at the node carrying (value, slot id); the node writes the matching slot.</text>

  <!-- Node 1: ReadGate -->
  <g id="node-readgate" data-role="node" data-kind="ReadGate">
    <rect x="180" y="100" width="200" height="180" rx="10" class="shape-node"/>
    <text x="280" y="128" font-size="14" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">ReadGate</text>
    <text x="280" y="146" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">rule: fire when s0 ∧ s1 ∧ s2</text>
    <rect id="rg-slot-0" x="195" y="170" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="206" y="186" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s0</text>
    <rect id="rg-slot-1" x="195" y="210" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="206" y="226" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s1</text>
    <rect id="rg-slot-2" x="195" y="250" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="206" y="266" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s2</text>
    <line x1="380" y1="190" x2="420" y2="190" class="outgoing"/>
  </g>

  <rect x="60"  y="170" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="100" y="186" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream A</text>
  <line x1="140" y1="181" x2="180" y2="181" class="incoming"/>
  <text x="160" y="176" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s0</text>

  <rect x="60"  y="210" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="100" y="226" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream B</text>
  <line x1="140" y1="221" x2="180" y2="221" class="incoming"/>
  <text x="160" y="216" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s1</text>

  <rect x="60"  y="250" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="100" y="266" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream C</text>
  <line x1="140" y1="261" x2="180" y2="261" class="incoming"/>
  <text x="160" y="256" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s2</text>

  <!-- Node 2: AndGate -->
  <g id="node-and" data-role="node" data-kind="AndGate">
    <rect x="700" y="100" width="200" height="180" rx="10" class="shape-node"/>
    <text x="800" y="128" font-size="14" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">AndGate</text>
    <text x="800" y="146" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">rule: fire when s0 ∧ s1</text>
    <rect id="and-slot-0" x="715" y="180" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="726" y="196" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s0</text>
    <rect id="and-slot-1" x="715" y="220" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="726" y="236" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s1</text>
    <line x1="900" y1="200" x2="940" y2="200" class="outgoing"/>
  </g>

  <rect x="580" y="180" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="620" y="196" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream A</text>
  <line x1="660" y1="191" x2="700" y2="191" class="incoming"/>
  <text x="680" y="186" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s0</text>

  <rect x="580" y="220" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="620" y="236" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream B</text>
  <line x1="660" y1="231" x2="700" y2="231" class="incoming"/>
  <text x="680" y="226" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s1</text>

  <!-- Node 3: StreakDetector -->
  <g id="node-streak" data-role="node" data-kind="StreakDetector">
    <rect x="180" y="320" width="200" height="180" rx="10" class="shape-node"/>
    <text x="280" y="348" font-size="14" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">StreakDetector</text>
    <text x="280" y="366" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">rule: fire when sgn(s0) = sgn(s1)</text>
    <rect id="sd-slot-0" x="195" y="400" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="206" y="416" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s0</text>
    <rect id="sd-slot-1" x="195" y="440" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="206" y="456" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s1</text>
    <line x1="380" y1="420" x2="420" y2="420" class="outgoing"/>
  </g>

  <rect x="60"  y="400" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="100" y="416" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream A</text>
  <line x1="140" y1="411" x2="180" y2="411" class="incoming"/>
  <text x="160" y="406" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s0</text>

  <rect x="60"  y="440" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="100" y="456" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream B</text>
  <line x1="140" y1="451" x2="180" y2="451" class="incoming"/>
  <text x="160" y="446" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s1</text>

  <!-- Node 4: EdgeNode XOR -->
  <g id="node-edge" data-role="node" data-kind="EdgeNode">
    <rect x="700" y="320" width="200" height="180" rx="10" class="shape-node"/>
    <text x="800" y="348" font-size="14" text-anchor="middle" font-weight="600" fill="#e65100" stroke="none">EdgeNode (XOR)</text>
    <text x="800" y="366" font-size="11" text-anchor="middle" font-weight="300" fill="#555" stroke="none">rule: fire when s0 ≠ s1</text>
    <rect id="ed-slot-0" x="715" y="400" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="726" y="416" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s0</text>
    <rect id="ed-slot-1" x="715" y="440" width="22" height="22" rx="3" class="shape-slot"/>
    <text x="726" y="456" font-size="9" text-anchor="middle" font-weight="600" fill="#1b5e20" stroke="none">s1</text>
    <line x1="900" y1="420" x2="940" y2="420" class="outgoing"/>
  </g>

  <rect x="580" y="400" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="620" y="416" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream A</text>
  <line x1="660" y1="411" x2="700" y2="411" class="incoming"/>
  <text x="680" y="406" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s0</text>

  <rect x="580" y="440" width="80" height="22" rx="3" class="shape-upstream"/>
  <text x="620" y="456" font-size="9" text-anchor="middle" font-weight="300" fill="#888" stroke="none">upstream B</text>
  <line x1="660" y1="451" x2="700" y2="451" class="incoming"/>
  <text x="680" y="446" font-size="9" text-anchor="middle" font-weight="600" fill="#555" stroke="none">→s1</text>

  <!-- Resolution note -->
  <rect x="60" y="525" width="980" height="90" rx="6" class="note-bg"/>
  <text x="550" y="546" font-size="13" text-anchor="middle" font-weight="600" fill="#f57f17" stroke="none">Resolution — the "how does the rule subscribe?" question dissolves</text>
  <text x="550" y="567" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">Slots don't notify anyone. They're passive cells (empty / filled / consumed) owned by the node. The node receives the wire's arrival,</text>
  <text x="550" y="583" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">sees the wire's bound slot id, writes that slot, then re-evaluates its rule. One wire per slot id, established at construction time —</text>
  <text x="550" y="599" font-size="11" text-anchor="middle" font-weight="300" fill="#f57f17" stroke="none">"right slot ↔ right wire" is deterministic by construction; mis-wiring is caught at parseSpec, not at runtime.</text>

  <g id="legend" data-role="legend">
    <rect x="20" y="625" width="1060" height="28" rx="4" class="legend-bg"/>
    <rect x="40" y="634" width="22" height="14" rx="3" class="shape-slot"/>
    <text x="72" y="645" font-size="11" font-weight="300" fill="#1b5e20" stroke="none">slot — passive state owned by the node</text>
    <line x1="320" y1="641" x2="360" y2="641" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arrow-gray)"/>
    <text x="368" y="645" font-size="11" font-weight="300" fill="#555" stroke="none">incoming wire (label "→s_k" = bound slot id)</text>
    <line x1="640" y1="641" x2="680" y2="641" stroke="#1565c0" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
    <text x="688" y="645" font-size="11" font-weight="300" fill="#1565c0" stroke="none">outgoing wire (pulse on fire)</text>
    <rect x="900" y="634" width="22" height="14" rx="3" class="shape-upstream"/>
    <text x="932" y="645" font-size="11" font-weight="300" fill="#888" stroke="none">upstream stub</text>
  </g>

</svg>
