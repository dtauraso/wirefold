<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480"
     font-family="ui-sans-serif, system-ui, sans-serif" font-weight="400">

<metadata>
{
  "title": "Event-Driven Wake — Current Model",
  "description": "fill() synchronously calls onRun(); two pulses from ReadGate arrive at i0 before wire clears, triggering in-flight assertion.",
  "nodes": [
    { "id": "readgate", "role": "readgate" },
    { "id": "wire-out", "role": "wire", "label": "readGate.out → i0.in" },
    { "id": "i0", "role": "inhibitor" }
  ],
  "edges": [
    { "id": "pulse1", "source": "readgate", "target": "i0", "kind": "chain", "note": "Rule 2: emit 0 (partial fill)" },
    { "id": "pulse2", "source": "readgate", "target": "i0", "kind": "chain", "note": "Rule 1: emit 1 (full fill) — arrives while wire in-flight → THROW" }
  ],
  "sequence": [
    { "t": 0.0, "event": "slot a fills → fill() calls onRun() → ReadGate sees partial → loads wire (pulse 1 in-flight)" },
    { "t": 0.1, "event": "slot b fills → fill() calls onRun() → ReadGate sees full → tries wire.load() while in-flight → THROW" }
  ]
}
</metadata>

<desc>
readgate — ReadGate node (AND-of-3 firing rule)
wire-out — single wire from readGate.out to i0.in
i0 — InhibitRightGate downstream node
pulse1 — first wire load (Rule 2, partial fill, emit 0)
pulse2 — second wire load (Rule 1, full fill, emit 1) — crashes
BUG: fill() synchronously calls onRun(); two rapid onRun() calls both attempt wire.load() before the wire clears
</desc>

<style>
  .diagram-bg { fill: #fafafa; }
  .title-text { font-size: 16px; font-weight: 700; fill: #222; }
  .section-label { font-size: 11px; fill: #888; }
  .shape-readgate { fill: #e8eaf6; stroke: #283593; stroke-width: 2; }
  .shape-inhibitor { fill: #fff3e0; stroke: #e65100; stroke-width: 2; }
  .shape-wire { fill: #f5f5f5; stroke: #999; stroke-width: 1.5; stroke-dasharray: 4 3; }
  .shape-error { fill: #ffebee; stroke: #c62828; stroke-width: 2; }
  .chain { stroke: #333; stroke-width: 1.5; fill: none; }
  .chain-blocked { stroke: #c62828; stroke-width: 2; fill: none; stroke-dasharray: 5 3; }
  .call-arrow { stroke: #7b1fa2; stroke-width: 1.5; fill: none; }
  .edge-label { font-size: 11px; }
  .behavior-note-bg { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
  .behavior-note-text { font-size: 11px; fill: #f57f17; }
  .error-label { font-size: 12px; fill: #c62828; font-weight: 700; }
  .step-label { font-size: 11px; fill: #555; }
</style>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#333" />
  </marker>
  <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#7b1fa2" />
  </marker>
  <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#c62828" />
  </marker>
</defs>

<!-- Background -->
<rect class="diagram-bg" x="0" y="0" width="800" height="480" rx="8" />

<!-- Title -->
<text class="title-text" x="400" y="30" text-anchor="middle" font-weight="700" fill="#222" stroke="none">
  Event-Driven Wake — Current Model (Bug Site)
</text>

<!-- ═══════ NODES ═══════ -->

<!-- ReadGate -->
<g id="node-readgate" data-role="readgate">
  <rect class="shape-readgate" x="100" y="120" width="120" height="60" rx="6" />
  <text x="160" y="145" text-anchor="middle" font-size="12" font-weight="100" fill="#283593" stroke="none">ReadGate</text>
  <text x="160" y="162" text-anchor="middle" font-size="10" font-weight="100" fill="#283593" stroke="none">AND-of-3 slots</text>
</g>

<!-- Wire (readGate.out → i0.in) -->
<g id="node-wire-out" data-role="wire">
  <rect class="shape-wire" x="290" y="133" width="140" height="34" rx="6" />
  <text x="360" y="150" text-anchor="middle" font-size="11" font-weight="100" fill="#555" stroke="none">wire: in-flight(0)</text>
  <text x="360" y="163" text-anchor="middle" font-size="10" font-weight="100" fill="#999" stroke="none">readGate.out → i0.in</text>
</g>

<!-- i0 (InhibitRightGate) -->
<g id="node-i0" data-role="inhibitor">
  <rect class="shape-inhibitor" x="510" y="120" width="120" height="60" rx="6" />
  <text x="570" y="145" text-anchor="middle" font-size="12" font-weight="100" fill="#e65100" stroke="none">i0</text>
  <text x="570" y="162" text-anchor="middle" font-size="10" font-weight="100" fill="#e65100" stroke="none">InhibitRightGate</text>
</g>

<!-- ═══════ EDGES — normal pulse 1 ═══════ -->
<g id="edge-pulse1" data-role="chain">
  <line class="chain" x1="220" y1="150" x2="288" y2="150" marker-end="url(#arrow)" />
  <text x="254" y="143" text-anchor="middle" class="edge-label" font-size="11" font-weight="300" fill="#111" stroke="none">pulse 1 ✓</text>
</g>

<!-- Wire to i0 -->
<g id="edge-wire-to-i0" data-role="chain">
  <line class="chain" x1="430" y1="150" x2="508" y2="150" marker-end="url(#arrow)" />
</g>

<!-- ═══════ CALL CHAIN — fill → onRun ═══════ -->

<!-- Node.fill() call box -->
<g id="node-fill-call" data-role="annotation">
  <rect x="100" y="230" width="140" height="36" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" />
  <text x="170" y="249" text-anchor="middle" font-size="11" font-weight="100" fill="#7b1fa2" stroke="none">slot.fill(slotId, v)</text>
  <text x="170" y="261" text-anchor="middle" font-size="10" font-weight="100" fill="#7b1fa2" stroke="none">sets phase = "filled"</text>
</g>

<!-- onRun() call box -->
<g id="node-onrun-call" data-role="annotation">
  <rect x="290" y="230" width="140" height="36" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" />
  <text x="360" y="249" text-anchor="middle" font-size="11" font-weight="100" fill="#7b1fa2" stroke="none">onRun() ← synchronous</text>
  <text x="360" y="261" text-anchor="middle" font-size="10" font-weight="100" fill="#7b1fa2" stroke="none">body re-evaluates rule</text>
</g>

<!-- wire.load() call box -->
<g id="node-wire-load-call" data-role="annotation">
  <rect x="480" y="230" width="140" height="36" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" />
  <text x="550" y="249" text-anchor="middle" font-size="11" font-weight="100" fill="#7b1fa2" stroke="none">wire.load(v)</text>
  <text x="550" y="261" text-anchor="middle" font-size="10" font-weight="100" fill="#7b1fa2" stroke="none">enters in-flight</text>
</g>

<!-- Arrows for call chain -->
<line class="call-arrow" x1="240" y1="248" x2="288" y2="248" marker-end="url(#arrow-magenta)" />
<line class="call-arrow" x1="430" y1="248" x2="478" y2="248" marker-end="url(#arrow-magenta)" />

<!-- fill → call chain link -->
<line class="call-arrow" x1="160" y1="180" x2="160" y2="228" marker-end="url(#arrow-magenta)" />
<text x="165" y="210" font-size="10" font-weight="300" fill="#7b1fa2" stroke="none">fill() call</text>

<!-- ═══════ SECOND PULSE (BUG) ═══════ -->

<!-- Second fill call box -->
<g id="node-fill2" data-role="annotation">
  <rect x="100" y="330" width="140" height="36" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1" />
  <text x="170" y="349" text-anchor="middle" font-size="11" font-weight="100" fill="#c62828" stroke="none">slot.fill(slotB, v)</text>
  <text x="170" y="361" text-anchor="middle" font-size="10" font-weight="100" fill="#c62828" stroke="none">Rule 1: now fully filled</text>
</g>

<!-- Second onRun box -->
<g id="node-onrun2" data-role="annotation">
  <rect x="290" y="330" width="140" height="36" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1" />
  <text x="360" y="349" text-anchor="middle" font-size="11" font-weight="100" fill="#c62828" stroke="none">onRun() again</text>
  <text x="360" y="361" text-anchor="middle" font-size="10" font-weight="100" fill="#c62828" stroke="none">wire still in-flight!</text>
</g>

<!-- THROW box -->
<g id="node-throw" data-role="error">
  <rect class="shape-error" x="480" y="325" width="200" height="46" rx="6" />
  <text x="580" y="346" text-anchor="middle" class="error-label" font-size="13" font-weight="700" fill="#c62828" stroke="none">THROW</text>
  <text x="580" y="362" text-anchor="middle" font-size="10" font-weight="100" fill="#c62828" stroke="none">wire.load() while in-flight</text>
</g>

<!-- Second call chain arrows -->
<line stroke="#c62828" stroke-width="1.5" fill="none" x1="160" y1="266" x2="160" y2="328" marker-end="url(#arrow-red)" />
<line stroke="#c62828" stroke-width="1.5" fill="none" x1="240" y1="348" x2="288" y2="348" marker-end="url(#arrow-red)" />
<line stroke="#c62828" stroke-width="1.5" fill="none" x1="430" y1="348" x2="478" y2="348" marker-end="url(#arrow-red)" />

<!-- ═══════ BEHAVIOR NOTE ═══════ -->
<g id="behavior-note" data-role="annotation">
  <rect class="behavior-note-bg" x="60" y="420" width="680" height="44" rx="4" />
  <text x="400" y="437" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#f57f17" stroke="none">
    Two successive fill() calls → two synchronous onRun() → second wire.load() finds wire in-flight → assertion throw.
  </text>
  <text x="400" y="452" text-anchor="middle" class="behavior-note-text" font-size="11" font-weight="300" fill="#f57f17" stroke="none">
    Wire transit time &gt; inter-pulse interval when wake is synchronous. No retry path.
  </text>
</g>

</svg>
